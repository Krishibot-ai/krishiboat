<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#16a34a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="KrishiBot"/>
<title>🌾 KrishiBot - कृषि मित्र</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Devanagari','Segoe UI',sans-serif;background:linear-gradient(160deg,#071a07 0%,#0d2a0d 60%,#091909 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px}
#app{width:100%;max-width:430px;border-radius:28px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,0.7),0 0 0 1px rgba(34,197,94,0.2);display:flex;flex-direction:column;height:92vh;max-height:800px;background:#0a1a0a}
.header{background:linear-gradient(135deg,#14532d,#166534);padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(34,197,94,0.2);flex-shrink:0}
#backBtn{background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:34px;height:34px;color:#fff;cursor:pointer;font-size:18px;display:none;align-items:center;justify-content:center;flex-shrink:0}
#backBtn.show{display:flex}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 18px rgba(34,197,94,0.5);flex-shrink:0}
.hinfo{flex:1}.hname{color:#fff;font-weight:700;font-size:16px}
.hstatus{display:flex;align-items:center;gap:5px;margin-top:2px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite}
.stext{color:#86efac;font-size:11px}
#menuScreen{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
#menuScreen.hide{display:none}
.wcard{background:linear-gradient(135deg,rgba(34,197,94,0.13),rgba(34,197,94,0.04));border:1px solid rgba(34,197,94,0.22);border-radius:20px;padding:14px 16px;text-align:center}
.wemoji{font-size:32px;margin-bottom:4px}.wtitle{color:#fff;font-weight:700;font-size:17px;margin-bottom:3px}.wsub{color:#86efac;font-size:12px;line-height:1.5}
.mlabel{color:#4ade80;font-size:12px;font-weight:700;letter-spacing:.8px}
.ogrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.obtn{border-radius:14px;padding:10px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;border:1.5px solid;transition:all .2s;font-family:inherit}
.oemoji{font-size:22px}.olabel{color:#e8f5e9;font-size:9.5px;font-weight:700;text-align:center;line-height:1.3}.odesc{color:rgba(134,239,172,0.55);font-size:8.5px;text-align:center}
.ftype{background:rgba(255,255,255,0.03);border:1px solid rgba(34,197,94,0.12);border-radius:16px;padding:10px}
.flabel{color:#86efac;font-size:12px;font-weight:600;margin-bottom:8px}.frow{display:flex;gap:8px}
#menuInput{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(34,197,94,0.2);border-radius:20px;padding:10px 16px;color:#e8f5e9;font-size:13px;outline:none;font-family:inherit}
#mSendBtn{width:40px;height:40px;border-radius:50%;background:rgba(34,197,94,0.15);border:none;cursor:pointer;font-size:16px;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
#mSendBtn.active{background:linear-gradient(135deg,#22c55e,#16a34a)}
#chatScreen{flex:1;overflow-y:auto;padding:16px;display:none;flex-direction:column;gap:12px}
#chatScreen.show{display:flex}
.dlabel{text-align:center}
.dbadge{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.15);color:#86efac;font-size:11px;padding:4px 12px;border-radius:20px;display:inline-block}
.mwrap{display:flex;align-items:flex-end;gap:8px}
.mwrap.user{justify-content:flex-end}
.mavatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.mbubble{max-width:82%;padding:10px 14px;font-size:13.5px;line-height:1.65;color:#e8f5e9}
.botb{background:rgba(255,255,255,0.05);border:1px solid rgba(34,197,94,0.15);border-radius:18px 18px 18px 4px}
.userb{background:linear-gradient(135deg,#15803d,#16a34a);border-radius:18px 18px 4px 18px}
.mtime{color:rgba(134,239,172,0.5);font-size:10px;margin-top:5px;text-align:right}
.typwrap{display:flex;align-items:flex-end;gap:8px}
.typbub{background:rgba(255,255,255,0.05);border:1px solid rgba(34,197,94,0.15);border-radius:18px 18px 18px 4px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.tdot{width:7px;height:7px;border-radius:50%;background:#4ade80}
.tdot:nth-child(1){animation:bounce 1.2s 0s infinite}
.tdot:nth-child(2){animation:bounce 1.2s .2s infinite}
.tdot:nth-child(3){animation:bounce 1.2s .4s infinite}
#chipsRow{padding:8px 14px 4px;background:#0a1a0a;border-top:1px solid rgba(34,197,94,0.08);display:none;overflow-x:auto;gap:7px}
#chipsRow.show{display:flex}
.chip{flex-shrink:0;background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.2);border-radius:16px;padding:5px 12px;color:#86efac;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit}
#inputRow{padding:8px 14px 14px;background:#0a1a0a;display:none;gap:8px;align-items:center}
#inputRow.show{display:flex}
#chatInput{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(34,197,94,0.2);border-radius:22px;padding:11px 16px;color:#e8f5e9;font-size:13.5px;outline:none;font-family:inherit}
#sendBtn{width:42px;height:42px;border-radius:50%;background:rgba(34,197,94,0.15);border:none;cursor:pointer;font-size:17px;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
#sendBtn.active{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 4px 14px rgba(34,197,94,0.35)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(34,197,94,0.25);border-radius:4px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <button id="backBtn">←</button>
    <div class="avatar">🌾</div>
    <div class="hinfo">
      <div class="hname">KrishiBot — कृषि मित्र</div>
      <div class="hstatus"><div class="sdot"></div><span class="stext" id="stext">कृषि विशेषज्ञ AI • ऑनलाइन</span></div>
    </div>
  </div>
  <div id="menuScreen">
    <div class="wcard">
      <div class="wemoji">👨‍🌾</div>
      <div class="wtitle">नमस्ते किसान भाई!</div>
      <div class="wsub">आपका डिजिटल कृषि मित्र<br/><strong style="color:#4ade80">नीचे से विषय चुनें 👇</strong></div>
    </div>
    <div class="mlabel">📋 क्या जानना है आपको?</div>
    <div class="ogrid" id="ogrid"></div>
    <div class="ftype">
      <div class="flabel">✍️ या सीधे अपनी समस्या लिखो:</div>
      <div class="frow">
        <input id="menuInput" placeholder="यहाँ लिखो..." type="text"/>
        <button id="mSendBtn">➤</button>
      </div>
    </div>
  </div>
  <div id="chatScreen">
    <div class="dlabel"><span class="dbadge" id="dateLabel"></span></div>
  </div>
  <div id="chipsRow"></div>
  <div id="inputRow">
    <input id="chatInput" placeholder="यहाँ लिखो..." type="text"/>
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  👇 SIRF YAHAN APNI GROQ KEY DAALO
//     console.groq.com se milegi (FREE)
//     Key aisi dikhti hai: gsk_XXXXX...
// ════════════════════════════════════════════
const GROQ_KEY = "YAHAN_APNI_GROQ_KEY_DAALO";
// ════════════════════════════════════════════

const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";

const SYSTEM = `Tu KrishiBot hai — ek expert Indian krishi sahayak AI.
Tu SIRF Hindi mein jawab deta hai — English bilkul nahi.
Tu in topics par help karta hai:
- Fasal ki bimari, dawai, keetnashak
- Mandi bhav, MSP prices
- Khad (urea, DAP, potash, jaivik)
- Sinchai (drip, sprinkler, kab kitna)
- Beej ki jaankari aur kisme
- Mausam ke hisab se salah
- Sarkari yojana (PM Kisan, Fasal Bima, KCC)
- Pashupalan (gai, bhains, bakri, murgi)
- Udyaniki kheti (sabji, fal, tamatar, pyaj, aalu)
- Krishak jamin (khasra, khatauni, bhulekh, registry, namantar)
Har jawab mein: simple Hindi, 120-150 words, 🌾 emoji use karo, practical solution do, ant mein "💡 Tip:" zaroor likho.`;

const OPTIONS = [
  {icon:"🌿",label:"फसल की बीमारी",desc:"रोग पहचानें",color:"#16a34a",msg:"फसल की बीमारी के बारे में जानकारी दो"},
  {icon:"🌦️",label:"मौसम सलाह",desc:"आज क्या करें",color:"#0369a1",msg:"मौसम के हिसाब से खेती में आज क्या करूँ"},
  {icon:"💊",label:"दवाई पूछो",desc:"सही दवाई जानें",color:"#7c3aed",msg:"फसल के लिए सही दवाई कौन सी है"},
  {icon:"💰",label:"मंडी भाव",desc:"आज के दाम",color:"#b45309",msg:"आज मंडी में फसल के भाव क्या हैं"},
  {icon:"🧪",label:"खाद जानकारी",desc:"उर्वरक सलाह",color:"#0f766e",msg:"फसल के लिए कौन सी खाद डालूँ और कितनी"},
  {icon:"🐛",label:"कीट समस्या",desc:"कीड़े भगाएं",color:"#b91c1c",msg:"फसल में कीड़े लग गए हैं क्या करूँ"},
  {icon:"🌱",label:"बीज जानकारी",desc:"अच्छे बीज चुनें",color:"#15803d",msg:"इस मौसम के लिए कौन सा बीज सबसे अच्छा है"},
  {icon:"💧",label:"सिंचाई सलाह",desc:"पानी कब दें",color:"#1d4ed8",msg:"फसल में कब और कितना पानी देना चाहिए"},
  {icon:"📋",label:"सरकारी योजना",desc:"मदद पाएं",color:"#9d174d",msg:"किसानों के लिए कौन सी सरकारी योजनाएं हैं"},
  {icon:"🐄",label:"पशुपालन",desc:"पशु की देखभाल",color:"#92400e",msg:"पशुपालन की जानकारी दो गाय भैंस बकरी मुर्गी"},
  {icon:"🍅",label:"उद्यानिकी खेती",desc:"सब्जी व फल",color:"#065f46",msg:"उद्यानिकी खेती सब्जी और फलों की जानकारी दो"},
  {icon:"🗺️",label:"कृषक जमीन",desc:"भूमि जानकारी",color:"#1e40af",msg:"कृषक जमीन खसरा खतौनी भूलेख की जानकारी दो"},
];

const CHIPS = ["और बताओ","दवाई का नाम","कहाँ मिलेगी","कितना खर्च","🏠 मेनू"];
let messages = [];
let loading = false;

const $ = id => document.getElementById(id);
const menuScreen=$('menuScreen'), chatScreen=$('chatScreen');
const chipsRow=$('chipsRow'), inputRow=$('inputRow');
const chatInput=$('chatInput'), sendBtn=$('sendBtn');
const menuInput=$('menuInput'), mSendBtn=$('mSendBtn');
const backBtn=$('backBtn'), stext=$('stext');

$('dateLabel').textContent = 'आज • ' + new Date().toLocaleDateString('hi-IN');

// Options Grid
const grid = $('ogrid');
OPTIONS.forEach(opt => {
  const btn = document.createElement('button');
  btn.className = 'obtn';
  btn.style.cssText = `background:linear-gradient(145deg,${opt.color}25,${opt.color}0f);border-color:${opt.color}40`;
  btn.innerHTML = `<span class="oemoji">${opt.icon}</span><span class="olabel">${opt.label}</span><span class="odesc">${opt.desc}</span>`;
  btn.onclick = () => startChat(opt.label, opt.msg);
  btn.onmouseenter = () => {btn.style.background=`linear-gradient(145deg,${opt.color}45,${opt.color}22)`;btn.style.transform='translateY(-3px)'};
  btn.onmouseleave = () => {btn.style.background=`linear-gradient(145deg,${opt.color}25,${opt.color}0f)`;btn.style.transform=''};
  grid.appendChild(btn);
});

// Chips
CHIPS.forEach(chip => {
  const c = document.createElement('button');
  c.className='chip'; c.textContent=chip;
  c.onclick = () => chip==='🏠 मेनू' ? showMenu() : sendMessage(chip);
  chipsRow.appendChild(c);
});

function showChat(topic){
  menuScreen.classList.add('hide');
  chatScreen.classList.add('show');
  chipsRow.classList.add('show');
  inputRow.classList.add('show');
  backBtn.classList.add('show');
  if(topic) stext.textContent = topic;
}
function showMenu(){
  menuScreen.classList.remove('hide');
  chatScreen.classList.remove('show');
  chipsRow.classList.remove('show');
  inputRow.classList.remove('show');
  backBtn.classList.remove('show');
  stext.textContent='कृषि विशेषज्ञ AI • ऑनलाइन';
  messages=[];
  [...chatScreen.children].slice(1).forEach(k=>k.remove());
}
backBtn.onclick = showMenu;

function getTime(){return new Date().toLocaleTimeString('hi-IN',{hour:'2-digit',minute:'2-digit'})}

function addBotMsg(text){
  const w=document.createElement('div'); w.className='mwrap';
  const h=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br/>');
  w.innerHTML=`<div class="mavatar">🌾</div><div class="mbubble botb"><div>${h}</div><div class="mtime">${getTime()}</div></div>`;
  chatScreen.appendChild(w); chatScreen.scrollTop=chatScreen.scrollHeight;
}
function addUserMsg(text){
  const w=document.createElement('div'); w.className='mwrap user';
  w.innerHTML=`<div class="mbubble userb"><div>${text}</div><div class="mtime">${getTime()} ✓✓</div></div>`;
  chatScreen.appendChild(w); chatScreen.scrollTop=chatScreen.scrollHeight;
}
function showTyping(){
  const w=document.createElement('div'); w.className='typwrap'; w.id='td';
  w.innerHTML=`<div class="mavatar">🌾</div><div class="typbub"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
  chatScreen.appendChild(w); chatScreen.scrollTop=chatScreen.scrollHeight;
}
function hideTyping(){const t=$('td');if(t)t.remove()}

async function callGroq(userText){
  if(loading) return;
  loading=true; sendBtn.textContent='⏳'; sendBtn.classList.remove('active');
  messages.push({role:'user', content: userText});
  showTyping();

  try{
    const res = await fetch(GROQ_URL, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer ' + GROQ_KEY
      },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        messages:[
          {role:'system', content: SYSTEM},
          ...messages
        ],
        temperature: 0.7,
        max_tokens: 600
      })
    });

    const data = await res.json();

    if(data.error){
      hideTyping();
      let errMsg = '⚠️ ' + data.error.message;
      if(data.error.message.includes('api_key') || data.error.message.includes('auth')){
        errMsg = '⚠️ Groq Key गलत है। index.html में GROQ_KEY सही डालो।';
      }
      if(data.error.message.includes('rate')){
        errMsg = '⚠️ बहुत ज्यादा requests। 1 मिनट बाद पूछो।';
      }
      addBotMsg(errMsg);
    } else {
      const reply = data.choices?.[0]?.message?.content || '⚠️ जवाब नहीं मिला।';
      messages.push({role:'assistant', content: reply});
      hideTyping();
      addBotMsg(reply);
    }
  } catch(e){
    hideTyping();
    addBotMsg('⚠️ Internet की समस्या है। दोबारा कोशिश करो।');
  }

  loading=false; sendBtn.textContent='➤'; updBtn();
}

async function startChat(topic, msg){
  showChat(topic);
  addUserMsg(msg);
  await callGroq(msg);
}

function sendMessage(text){
  const msg = text || chatInput.value.trim();
  if(!msg || loading) return;
  chatInput.value=''; updBtn();
  if(!chatScreen.classList.contains('show')) showChat('सीधा सवाल');
  addUserMsg(msg);
  callGroq(msg);
}

chatInput.addEventListener('input', updBtn);
chatInput.addEventListener('keydown', e=>{if(e.key==='Enter')sendMessage()});
sendBtn.onclick = ()=>sendMessage();
menuInput.addEventListener('input',()=>{mSendBtn.classList.toggle('active',menuInput.value.trim().length>0)});
menuInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&menuInput.value.trim()){const t=menuInput.value.trim();menuInput.value='';sendMessage(t)}
});
mSendBtn.onclick=()=>{
  if(menuInput.value.trim()){const t=menuInput.value.trim();menuInput.value='';sendMessage(t)}
};
function updBtn(){sendBtn.classList.toggle('active',chatInput.value.trim().length>0&&!loading)}
</script>
</body>
</html>
